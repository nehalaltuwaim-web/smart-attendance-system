<!doctype html>
<html lang="ar" dir="rtl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>استعادة كلمة المرور - نظام الحضور الذكي</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		body {
			font-family: 'Cairo', sans-serif;
		}

		.card-shadow {
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
		}

		.psau-gradient {
			background: linear-gradient(135deg, #1a3a8a 0%, #0d1d45 100%);
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-2">

	<div class="w-full max-w-md">
		<!-- Logo Section -->
		<div class="text-center mb-10">
			<div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-lg mb-4">
				<i class="fas fa-key text-3xl text-[#1a3a8a]"></i>
			</div>
			<h1 class="text-2xl font-bold text-[#1a3a8a]">استعادة كلمة المرور</h1>
			<p class="text-gray-500 text-sm mt-2">أدخل بريدك الإلكتروني الجامعي لإرسال رابط الاستعادة</p>
		</div>

		<!-- Main Card -->
		<div id="forgotCard" class="bg-white rounded-[2.5rem] p-8 card-shadow transition-all duration-500">
			<form id="forgotForm" class="space-y-6">

				<!-- Email Input -->
				<div class="space-y-2">
					<label class="block text-right text-sm font-bold text-[#1a3a8a] mr-2">البريد الإلكتروني</label>
					<div
						class="relative flex items-center border border-gray-100 bg-gray-50 rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:bg-white">
						<div class="px-4 text-gray-400 border-r border-gray-100">
							<i class="far fa-envelope text-sm"></i>
						</div>
						<input id="emailInput" type="email" placeholder="example@psau.edu.sa"
							class="w-full px-1 py-4 text-right outline-none bg-transparent placeholder:text-gray-300 text-sm"
							required />

					</div>
					<p id="emailError" class="text-[10px] text-red-500 text-right pr-2 hidden">يرجى إدخال بريد إلكتروني صحيح</p>
				</div>

				<!-- Submit Button -->
				<button type="submit"
					class="w-full bg-[#1a3a8a] text-white font-bold py-4 rounded-2xl shadow-md hover:bg-[#142d6b] transition-all transform active:scale-[0.98] mt-4">
					إرسال رابط الاستعادة
				</button>

				<!-- Back to Login -->
				<div class="text-center mt-6">
					<a href="index.html" class="text-sm font-bold text-gray-400 hover:text-[#1a3a8a] transition-colors">
						<i class="fas fa-arrow-right ml-2 text-xs"></i>
						العودة لتسجيل الدخول
					</a>
				</div>
			</form>
		</div>

		<!-- Success View (Hidden by default) -->
		<div id="successView"
			class="hidden bg-white rounded-[2.5rem] p-10 card-shadow text-center space-y-6 animate-in fade-in zoom-in duration-500">
			<div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto shadow-sm">
				<i class="fas fa-paper-plane text-3xl"></i>
			</div>
			<div class="space-y-2">
				<h2 class="text-xl font-bold text-gray-800">تم الإرسال بنجاح!</h2>
				<p class="text-gray-500 text-sm leading-relaxed">
					لقد أرسلنا رابط استعادة كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد.
				</p>
			</div>
			<a href="index.html"
				class="block w-full bg-gray-50 text-[#1a3a8a] font-bold py-4 rounded-2xl hover:bg-gray-100 transition-all">
				العودة للرئيسية
			</a>
		</div>

	</div>

	<script>
		const forgotForm = document.getElementById('forgotForm');
		const forgotCard = document.getElementById('forgotCard');
		const successView = document.getElementById('successView');
		const emailInput = document.getElementById('emailInput');
		const emailError = document.getElementById('emailError');

		forgotForm.addEventListener('submit', (e) => {
			e.preventDefault();

			const email = emailInput.value;
			const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

			if (!emailRegex.test(email)) {
				emailError.classList.remove('hidden');
				return;
			}

			emailError.classList.add('hidden');

			// Simulate sending email
			forgotCard.classList.add('hidden');
			successView.classList.remove('hidden');
		});
	</script>
</body>

</html>
