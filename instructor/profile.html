<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الملف الشخصي - المحاضر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
        <a href="home.html" class="text-xl">
            <i class="fas fa-arrow-right"></i>
        </a>
        <h1 class="text-lg font-bold">الملف الشخصي</h1>
        <div class="w-6"></div>
    </div>

    <div class="max-w-md mx-auto p-6">

        <!-- Profile Header Card -->
        <div class="bg-white rounded-3xl p-8 card-shadow flex flex-col items-center mb-8">
            <div id="profileInitial" class="w-24 h-24 bg-[#1a3a8a] rounded-full flex items-center justify-center text-white text-4xl font-bold mb-4 border-4 border-white shadow-md">
                د
            </div>
            <h2 id="profileName" class="text-2xl font-bold text-[#1a3a8a]">د. فهد العتيبي</h2>
            <p class="text-gray-400">محاضر</p>
        </div>

        <!-- Personal Info Card -->
        <div class="bg-white rounded-3xl p-6 card-shadow space-y-6 mb-6">
            <h3 class="text-lg font-bold text-[#1a3a8a] border-b pb-4">المعلومات الشخصية</h3>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">الاسم</p>
                    <p id="infoName" class="text-[#1a3a8a] font-bold">د. فهد العتيبي</p>
                </div>
                <i class="far fa-user text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">البريد الإلكتروني</p>
                    <p id="infoEmail" class="text-[#1a3a8a] font-bold text-sm">fahad@psau.edu.sa</p>
                </div>
                <i class="far fa-envelope text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">رقم الهاتف</p>
                    <p id="infoPhone" class="text-[#1a3a8a] font-bold">0507654321</p>
                </div>
                <i class="fas fa-phone-alt text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">القسم</p>
                    <p id="infoDepartment" class="text-[#1a3a8a] font-bold">علوم الحاسب</p>
                </div>
                <i class="fas fa-building text-gray-400"></i>
            </div>
        </div>

        <!-- Account Settings Card -->
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <h3 class="text-lg font-bold text-[#1a3a8a] border-b pb-4">إعدادات الحساب</h3>
            <a href="change-password.html" class="py-4 flex items-center justify-between text-gray-600 hover:text-[#1a3a8a] cursor-pointer border-b">
                <span class="font-bold">تغيير كلمة المرور</span>
                <i class="fas fa-chevron-left text-xs"></i>
            </a>
            <div id="logoutBtn" class="py-4 flex items-center justify-between text-red-500 hover:text-red-700 cursor-pointer">
                <span class="font-bold">تسجيل الخروج</span>
                <i class="fas fa-chevron-left text-xs"></i>
            </div>
        </div>

    </div>

    <script src="../src/config.js"></script>
    <script src="../src/auth.js"></script>
    <script src="../src/functions.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const auth = checkAuth('instructor');
        if (!auth) throw new Error('Redirecting...');
        const currentInstructor = auth.user;

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('profileName').textContent = currentInstructor.name || 'محاضر';
            document.getElementById('profileInitial').textContent = (currentInstructor.name || 'د').charAt(0);
            document.getElementById('infoName').textContent = currentInstructor.name || 'غير محدد';
            document.getElementById('infoEmail').textContent = currentInstructor.email || 'غير محدد';
            document.getElementById('infoPhone').textContent = currentInstructor.phone || 'غير محدد';
            document.getElementById('infoDepartment').textContent = currentInstructor.department || 'غير محدد';
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            logout();
        });
    </script>
</body>
</html>
