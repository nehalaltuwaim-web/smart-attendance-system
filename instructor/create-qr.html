<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء رمز QR - المحاضر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .qr-container { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        /* تنسيق حقول الإدخال */
        input[type="date"], input[type="time"] {
            direction: ltr;
            text-align: right;
            font-family: 'Cairo', sans-serif;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
            margin-right: 0;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
        <a href="home.html" class="text-xl">
            <i class="fas fa-arrow-right"></i>
        </a>
        <h1 id="pageTitle" class="text-lg font-bold">إنشاء رمز QR</h1>
        <div class="w-6"></div>
    </div>

    <!-- Status Message Toast -->
    <div id="statusMessage" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 hidden px-6 py-3 rounded-xl font-bold shadow-lg text-center"></div>

    <!-- Main Content (Form) -->
    <div id="formContainer" class="max-w-md mx-auto p-6 space-y-8">
        <!-- Course Selection -->
        <div class="space-y-2">
            <label class="block text-right text-sm font-bold text-[#1a3a8a]">اختر المقرر</label>
            <div class="relative flex items-center border border-gray-200 bg-white rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:ring-4 focus-within:ring-blue-100">
                <select id="courseSelect" class="w-full px-4 py-4 text-right bg-transparent outline-none appearance-none font-bold text-[#1a3a8a] text-sm">
                    <option value="" disabled selected>جاري تحميل المقررات...</option>
                </select>
                <div class="px-4 text-gray-400 pointer-events-none">
                    <i class="fas fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Room Number -->
        <div class="space-y-2">
            <label class="block text-right text-sm font-bold text-[#1a3a8a]">رقم القاعة</label>
            <div class="relative flex items-center border border-gray-200 bg-white rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:ring-4 focus-within:ring-blue-100">
                <input id="roomInput" type="text" placeholder="مثال: مبنى 15 - قاعة 101" class="w-full px-4 py-4 text-right outline-none placeholder:text-gray-300 text-sm" />
            </div>
        </div>

        <!-- Date Picker (HTML5) -->
        <div class="space-y-2">
            <label class="block text-right text-sm font-bold text-[#1a3a8a]">تاريخ المحاضرة</label>
            <div class="relative flex items-center border border-gray-200 bg-white rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:ring-4 focus-within:ring-blue-100">
                <input type="date" id="dateInput" class="w-full px-4 py-4 text-right outline-none text-gray-700 text-sm" value="" />
                <div class="px-4 text-gray-400">
                    <i class="far fa-calendar-alt"></i>
                </div>
            </div>
        </div>

        <!-- Time Picker (HTML5) -->
        <div class="space-y-2">
            <label class="block text-right text-sm font-bold text-[#1a3a8a]">وقت المحاضرة</label>
            <div class="relative flex items-center border border-gray-200 bg-white rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:ring-4 focus-within:ring-blue-100">
                <input type="time" id="timeInput" class="w-full px-4 py-4 text-right outline-none text-gray-700 text-sm" value="" />
                <div class="px-4 text-gray-400">
                    <i class="far fa-clock"></i>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button id="submitBtn" disabled class="w-full bg-gray-200 text-gray-400 font-bold py-4 rounded-2xl cursor-not-allowed mt-8 transition-colors">
            إنشاء رمز QR
        </button>
    </div>

    <!-- Success View (QR Code) -->
    <div id="successContainer" class="hidden max-w-md mx-auto p-6 space-y-8">
        <div class="bg-[#e8f5f1] rounded-2xl p-4 flex items-center justify-start border border-[#d1e9e2] text-[#2d9d78]">
            <i class="far fa-check-circle text-2xl"></i>
            <div class="text-right mr-2">
                <h3 class="font-bold text-sm">تم إنشاء رمز QR بنجاح</h3>
                <p class="text-xs opacity-80">اعرض هذا الرمز للطلاب لتسجيل الحضور</p>
            </div>
        </div>

        <div class="qr-container flex flex-col items-center space-y-6">
            <div class="w-64 h-64 bg-gray-100 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-300">
                <img id="qrImage" src="" alt="QR Code" class="w-full h-full p-4" />
            </div>
            <div class="text-center">
                <h2 id="qrCourseName" class="text-xl font-bold text-[#1a3a8a]">هياكل البيانات - CS301</h2>
                <p id="qrRoomName" class="text-gray-400">القاعة: 101</p>
            </div>
        </div>

        <div class="bg-[#fff7ed] rounded-3xl p-6 border border-[#ffedd5] space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2 space-x-reverse text-[#f97316]">
                    <i class="far fa-clock"></i>
                    <span class="text-sm font-bold">الوقت المتبقي:</span>
                </div>
                <span id="countdown" class="text-[#f97316] font-bold">--:--:--</span>
            </div>
            <button id="endSessionBtn" class="w-full bg-[#ef4444] text-white font-bold py-4 rounded-2xl shadow-md hover:bg-red-600 transition-colors">
                إنهاء الجلسة
            </button>
        </div>

        <button id="resetBtn" class="w-full border-2 border-[#1a3a8a] text-[#1a3a8a] font-bold py-4 rounded-2xl hover:bg-[#1a3a8a]/5 transition-colors">
            إنشاء رمز جديد
        </button>
    </div>

    <script src="../src/config.js"></script>
    <script src="../src/auth.js"></script>
    <script src="../src/functions.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // التحقق من الجلسة (محاضر)
        const auth = checkAuth('instructor');
        if (!auth) {
            throw new Error('Redirecting...');
        }
        const currentInstructor = auth.user;

        // عناصر DOM
        const formContainer = document.getElementById('formContainer');
        const successContainer = document.getElementById('successContainer');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const endSessionBtn = document.getElementById('endSessionBtn');
        const courseSelect = document.getElementById('courseSelect');
        const roomInput = document.getElementById('roomInput');
        const dateInput = document.getElementById('dateInput');
        const timeInput = document.getElementById('timeInput');
        const statusMessage = document.getElementById('statusMessage');

        // متغيرات التحديد
        let selectedCourseId = null;
        let selectedCourseName = '';

        // تحميل المقررات
        async function loadCourses() {
            try {
                const { data: courses, error } = await supabaseClient
                    .from('courses')
                    .select('id, code, name')
                    .eq('instructor_id', currentInstructor.id);

                if (error) throw error;

                if (!courses || courses.length === 0) {
                    courseSelect.innerHTML = '<option value="" disabled>لا توجد مقررات</option>';
                    return;
                }

                let options = '<option value="" disabled selected>اختر المقرر...</option>';
                courses.forEach(course => {
                    options += `<option value="${course.id}" data-name="${course.name}">${course.name} (${course.code})</option>`;
                });
                courseSelect.innerHTML = options;
            } catch (error) {
                console.error('Error loading courses:', error);
                showStatus('فشل تحميل المقررات', 'error');
            }
        }

        loadCourses();

        // التحقق من صحة النموذج
        function validateForm() {
            const isCourseSelected = courseSelect.value !== "";
            const isRoomFilled = roomInput.value.trim() !== "";
            const isDateSelected = dateInput.value !== "";
            const isTimeSelected = timeInput.value !== "";

            if (isCourseSelected && isRoomFilled && isDateSelected && isTimeSelected) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');
                submitBtn.classList.add('bg-[#1a3a8a]', 'text-white', 'hover:bg-[#142d6b]');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');
                submitBtn.classList.remove('bg-[#1a3a8a]', 'text-white', 'hover:bg-[#142d6b]');
            }
        }

        courseSelect.addEventListener('change', (e) => {
            const selectedOption = e.target.options[e.target.selectedIndex];
            selectedCourseId = e.target.value;
            selectedCourseName = selectedOption.dataset.name || selectedOption.text;
            validateForm();
        });

        roomInput.addEventListener('input', validateForm);
        dateInput.addEventListener('change', validateForm);
        timeInput.addEventListener('input', validateForm);

        // إنشاء رمز QR وإدراج الجلسة في قاعدة البيانات
        submitBtn.addEventListener('click', async () => {
            // تعطيل الزر أثناء المعالجة
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'جاري الإنشاء...';

            try {
       

                // توليد رمز QR فريد
                const qrToken = crypto.randomUUID ? crypto.randomUUID() : 'qr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

                // تجهيز وقت البدء والانتهاء (مدة افتراضية ساعة)
                const selectedDate = dateInput.value; // YYYY-MM-DD
                const selectedTime = timeInput.value; // HH:MM
                const startTime = new Date(`${selectedDate}T${selectedTime}:00+03:00`); // المنطقة الزمنية +3 (السعودية)
                const endTime = new Date(startTime);
                endTime.setHours(endTime.getHours() + 1); // مدة ساعة

                // إدراج الجلسة في جدول sessions
                const { data: session, error } = await supabaseClient
                    .from('sessions')
                    .insert({
                        course_id: selectedCourseId,
                        qr_token: qrToken,
                        start_time: startTime.toISOString(),
                        end_time: endTime.toISOString()
                    })
                    .select()
                    .single();

                if (error) throw error;

                // نجاح: عرض رمز QR
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');

                // تحديث معلومات رمز QR
                document.getElementById('qrCourseName').textContent = selectedCourseName;
                document.getElementById('qrRoomName').textContent = `القاعة: ${roomInput.value}`;

                // إنشاء رابط QR باستخدام API
                const qrData = qrToken; // يمكن تضمين معلومات إضافية مثل معرف الجلسة
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrData)}`;
                document.getElementById('qrImage').src = qrUrl;

                // بدء العد التنازلي (ساعة)
                startCountdown(endTime);

                showStatus('تم إنشاء رمز QR بنجاح', 'success');

            } catch (error) {
                console.error('Error creating session:', error);
                showStatus('فشل إنشاء الجلسة: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'إنشاء رمز QR';
            }
        });

        // دالة العد التنازلي
        function startCountdown(endTime) {
            const countdownEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                const now = new Date();
                const diff = endTime - now;
                if (diff <= 0) {
                    clearInterval(interval);
                    countdownEl.textContent = 'انتهت';
                } else {
                    const hours = Math.floor(diff / 3600000);
                    const minutes = Math.floor((diff % 3600000) / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    countdownEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // إنهاء الجلسة (يمكن تطويره لتعطيل الجلسة في قاعدة البيانات)
        endSessionBtn.addEventListener('click', async () => {
            if (confirm('هل أنت متأكد من إنهاء الجلسة؟')) {
                // يمكن تحديث حالة الجلسة في قاعدة البيانات (إضافة عمود is_active)
                // حالياً نكتفي بالعودة إلى الصفحة الرئيسية
                window.location.href = 'home.html';
            }
        });

        // زر إنشاء رمز جديد (إعادة تحميل الصفحة)
        resetBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
