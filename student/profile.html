<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الملف الشخصي - نظام الحضور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
        <a href="home.html" class="text-xl">
            <i class="fas fa-arrow-right"></i>
        </a>
        <h1 class="text-lg font-bold">الملف الشخصي</h1>
        <div class="w-6"></div> <!-- Spacer -->
    </div>

    <div class="max-w-md mx-auto p-6">

        <!-- Profile Header Card -->
        <div class="bg-white rounded-3xl p-8 card-shadow flex flex-col items-center mb-8 relative z-5">
            <div id="profileInitial"
                class="w-24 h-24 bg-[#1a3a8a] rounded-full flex items-center justify-center text-white text-4xl font-bold mb-4 border-4 border-white shadow-md">
                أ
            </div>
            <h2 id="profileName" class="text-2xl font-bold text-[#1a3a8a]">أحمد محمد</h2>
            <p class="text-gray-400">طالب</p>
        </div>

        <!-- Personal Info Card -->
        <div class="bg-white rounded-3xl p-6 card-shadow space-y-6 mb-6">
            <h3 class="text-lg font-bold text-[#1a3a8a] border-b pb-4">المعلومات الشخصية</h3>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">الاسم</p>
                    <p id="infoName" class="text-[#1a3a8a] font-bold">أحمد محمد</p>
                </div>
                <i class="far fa-user text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">الرقم الجامعي</p>
                    <p id="infoUniId" class="text-[#1a3a8a] font-bold">435012345</p>
                </div>
                <i class="far fa-id-card text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">البريد الإلكتروني</p>
                    <p id="infoEmail" class="text-[#1a3a8a] font-bold text-sm">ahmed@psau.edu.sa</p>
                </div>
                <i class="far fa-envelope text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">رقم الهاتف</p>
                    <p id="infoPhone" class="text-[#1a3a8a] font-bold">0501234567</p>
                </div>
                <i class="fas fa-phone-alt text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">القسم</p>
                    <p id="infoMajor" class="text-[#1a3a8a] font-bold">علوم الحاسب</p>
                </div>
                <i class="fas fa-building text-gray-400"></i>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-right">
                    <p class="text-gray-400 text-xs">المستوى</p>
                    <p id="infoLevel" class="text-[#1a3a8a] font-bold">ثالث</p>
                </div>
                <i class="fas fa-graduation-cap text-gray-400"></i>
            </div>

        </div>

        <!-- Account Settings Card -->
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <h3 class="text-lg font-bold text-[#1a3a8a] border-b pb-4">إعدادات الحساب</h3>
            <a href="change-password.html" class="py-4 flex items-center justify-between text-gray-600 hover:text-[#1a3a8a] cursor-pointer border-b">
                <span class="font-bold">تغيير كلمة المرور</span>
                <i class="fas fa-chevron-left text-xs"></i>
            </a>
            <div id="logoutBtn" class="py-4 flex items-center justify-between text-red-500 hover:text-red-700 cursor-pointer">
                <span class="font-bold">تسجيل الخروج</span>
                <i class="fas fa-chevron-left text-xs"></i>
            </div>
        </div>

    </div>

    <!-- scripts -->
    <script src="../src/config.js"></script>
    <script src="../src/auth.js"></script>
    <script src="../src/functions.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // التحقق من الجلسة ونوع المستخدم
        const auth = checkAuth('student');
        if (!auth) {
            // تم إعادة التوجيه
            throw new Error('Redirecting...');
        }
        const currentStudent = auth.user;

        // تحديث واجهة المستخدم
        document.addEventListener('DOMContentLoaded', function () {
            // الاسم في الهيدر
            document.getElementById('profileName').textContent = currentStudent.name || 'طالب';

            // الحرف الأول للصورة الرمزية
            const initial = (currentStudent.name || 'أ').charAt(0);
            document.getElementById('profileInitial').textContent = initial;

            // تحديث حقول المعلومات الشخصية
            document.getElementById('infoName').textContent = currentStudent.name || 'غير محدد';
            document.getElementById('infoUniId').textContent = currentStudent.university_id || 'غير محدد';
            document.getElementById('infoEmail').textContent = currentStudent.email || 'غير محدد';
            document.getElementById('infoPhone').textContent = currentStudent.phone || 'غير محدد';
            document.getElementById('infoMajor').textContent = currentStudent.major || 'غير محدد';
            document.getElementById('infoLevel').textContent = currentStudent.level || 'غير محدد';

            // زر تسجيل الخروج
            document.getElementById('logoutBtn').addEventListener('click', function (e) {
                e.preventDefault();
                logout(); // من auth.js
            });
        });
    </script>
</body>

</html>
